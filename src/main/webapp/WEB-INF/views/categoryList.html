<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 목록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .action-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 4px; text-decoration: none; color: white; }
        .btn-primary { background: #4a90d9; }
        .btn-secondary { background: #6c757d; }
        .btn:hover { opacity: 0.92; }
        .alert { padding: 12px 16px; border-radius: 4px; margin-bottom: 14px; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .alert-error { background: #fdecea; border: 1px solid #f5c6cb; color: #b02a37; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th { background: #4a90d9; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f8fbff; }
        .empty-msg { padding: 30px; text-align: center; color: #6c757d; border: 1px dashed #ced4da; border-radius: 8px; margin-top: 16px; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>

    <th:block th:replace="~{fragments/siteInfo :: siteHeader}"></th:block>

    <h1>카테고리 목록</h1>

    <div class="action-bar">
        <a class="btn btn-primary" th:href="@{/categories/create}">+ 카테고리 등록</a>
        <a class="btn btn-secondary" th:href="@{/products}">상품 목록으로 이동</a>
    </div>

    <p class="alert alert-success"
       th:if="${successMessage}"
       th:text="${successMessage}">등록 완료</p>
    <p class="alert alert-error"
       th:if="${errorMessage}"
       th:text="${errorMessage}">오류 메시지</p>

    <div class="empty-msg" th:if="${#lists.isEmpty(categories)}">
        등록된 카테고리가 없습니다.
    </div>

    <table th:unless="${#lists.isEmpty(categories)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>카테고리명</th>
            <th>작업</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}">1</td>
            <td th:text="${cat.name}">전자제품</td>
            <td>
                <form th:action="@{/categories/{id}/delete(id=${cat.id})}"
                      method="post"
                      onsubmit="return confirm('정말 삭제하시겠습니까?');">
                    <button type="submit" class="btn-delete">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <th:block th:replace="~{fragments/siteInfo :: siteFooter}"></th:block>

</body>
</html>
