<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
        .back-btn:hover { background: #545b62; }
        .form-card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #495057; }
        input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1em; box-sizing: border-box; font-family: inherit; }
        input:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15); }
        .field-error { border-color: #e74c3c !important; }
        .error-msg { color: #e74c3c; font-size: 0.9em; margin-top: 6px; display: block; }
        .btn-submit { background: #4a90d9; color: white; border: none; padding: 10px 24px; font-size: 1em; border-radius: 4px; cursor: pointer; }
        .btn-submit:hover { background: #357abd; }
        .hint { color: #6c757d; font-size: 0.9em; margin-top: 6px; }
    </style>
</head>
<body>

    <th:block th:replace="~{fragments/siteInfo :: siteHeader}"></th:block>

    <h1>카테고리 등록</h1>

    <a class="back-btn" th:href="@{/categories}">← 카테고리 목록으로 돌아가기</a>

    <div class="form-card">
        <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
            <div class="form-group">
                <label for="name">카테고리 이름</label>
                <input type="text"
                       th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'field-error'"
                       placeholder="카테고리 이름" />
                <span class="error-msg"
                      th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}">카테고리 이름 오류</span>
                <p class="hint">공백 없이 최대 50자까지 입력할 수 있습니다.</p>
            </div>

            <button type="submit" class="btn-submit">등록</button>
        </form>
    </div>

    <th:block th:replace="~{fragments/siteInfo :: siteFooter}"></th:block>

</body>
</html>
